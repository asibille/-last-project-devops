name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ANSIBLE_FORCE_COLOR: "1"
  ANSIBLE_HOST_KEY_CHECKING: "False"

jobs:

  # ─────────────────────────────────────────────────────────
  # JOB 1 — Build application
  # ─────────────────────────────────────────────────────────
  build:
    name: "Build Application"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Backend
        working-directory: projet-final/backend
        run: npm install

      - name: Install Frontend
        working-directory: projet-final/frontend
        run: npm install

      - name: Docker Build app
        working-directory: projet-final
        run: docker compose build frontend backend db

  # ─────────────────────────────────────────────────────────
  # JOB 2 — Build infrastructure Docker (Ansible nodes)
  # ─────────────────────────────────────────────────────────
  build-infrastructure:
    name: "Build Infrastructure Docker"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Générer clé SSH RSA 4096
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t rsa -b 4096 -f ~/.ssh/id_rsa -N ""
          echo "SSH_PUB_KEY=$(cat ~/.ssh/id_rsa.pub)" >> $GITHUB_ENV

      - name: Build images Docker (nodes Ansible)
        working-directory: projet-final
        run: |
          docker compose build \
            --build-arg SSH_PUB_KEY="${{ env.SSH_PUB_KEY }}" \
            ansible-controller ubuntu-node fedora-node redhat-node

      - name: Démarrer les containers
        working-directory: projet-final
        run: |
          docker compose up -d ansible-controller ubuntu-node fedora-node redhat-node

      - name: Copier clé privée dans le controller
        working-directory: projet-final
        run: |
          sleep 5
          docker compose cp ~/.ssh/id_rsa ansible-controller:/root/.ssh/id_rsa
          docker compose exec ansible-controller chmod 600 /root/.ssh/id_rsa

      - name: Attendre SSH disponible sur les 3 noeuds
        working-directory: projet-final
        run: |
          for ip in 172.20.0.21 172.20.0.22 172.20.0.23; do
            echo "Attente SSH sur $ip..."
            timeout 120 bash -c \
              "until docker compose exec ansible-controller \
               ssh -i /root/.ssh/id_rsa \
               -o StrictHostKeyChecking=no \
               -o ConnectTimeout=5 \
               ansible@$ip 'echo ok' 2>/dev/null; \
               do sleep 3; done"
            echo "$ip pret"
          done

      - name: Status containers
        working-directory: projet-final
        run: docker compose ps

  # ─────────────────────────────────────────────────────────
  # JOB 3 — Terraform : génération inventaire Ansible
  # ─────────────────────────────────────────────────────────
  terraform:
    name: "Terraform — Inventaire"
    runs-on: ubuntu-latest
    needs: build-infrastructure
    steps:
      - uses: actions/checkout@v4

      - name: Générer clé SSH + démarrer containers
        working-directory: projet-final
        run: |
          ssh-keygen -t rsa -b 4096 -f ~/.ssh/id_rsa -N ""
          docker compose build \
            --build-arg SSH_PUB_KEY="$(cat ~/.ssh/id_rsa.pub)" \
            ansible-controller ubuntu-node fedora-node redhat-node
          docker compose up -d ansible-controller ubuntu-node fedora-node redhat-node
          sleep 10

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        working-directory: projet-final/terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: projet-final/terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: projet-final/terraform
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: projet-final/terraform
        run: terraform apply -auto-approve tfplan

      - name: Afficher inventaire généré
        working-directory: projet-final
        run: |
          echo "=== Inventaire généré par Terraform ==="
          cat inventory/hosts.ini

      - name: Upload inventaire artifact
        uses: actions/upload-artifact@v4
        with:
          name: ansible-inventory
          path: projet-final/inventory/hosts.ini

  # ─────────────────────────────────────────────────────────
  # JOB 4 — Ansible : gather facts + gestion timezone
  # ─────────────────────────────────────────────────────────
  ansible:
    name: "Ansible — Automation"
    runs-on: ubuntu-latest
    needs: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Générer clé SSH + démarrer containers
        working-directory: projet-final
        run: |
          ssh-keygen -t rsa -b 4096 -f ~/.ssh/id_rsa -N ""
          docker compose build \
            --build-arg SSH_PUB_KEY="$(cat ~/.ssh/id_rsa.pub)" \
            ansible-controller ubuntu-node fedora-node redhat-node
          docker compose up -d ansible-controller ubuntu-node fedora-node redhat-node
          sleep 15

      - name: Copier clé privée dans le controller
        working-directory: projet-final
        run: |
          docker compose cp ~/.ssh/id_rsa ansible-controller:/root/.ssh/id_rsa
          docker compose exec ansible-controller chmod 600 /root/.ssh/id_rsa

      - name: Attendre SSH sur les 3 noeuds
        working-directory: projet-final
        run: |
          for ip in 172.20.0.21 172.20.0.22 172.20.0.23; do
            timeout 120 bash -c \
              "until docker compose exec ansible-controller \
               ssh -i /root/.ssh/id_rsa \
               -o StrictHostKeyChecking=no \
               -o ConnectTimeout=5 ansible@$ip 'echo ok' 2>/dev/null; \
               do sleep 3; done"
          done

      - name: Télécharger inventaire Terraform
        uses: actions/download-artifact@v4
        with:
          name: ansible-inventory
          path: projet-final/inventory/

      - name: Copier inventaire dans le controller
        working-directory: projet-final
        run: docker compose cp inventory/hosts.ini ansible-controller:/inventory/hosts.ini

      - name: Installer collection community.general
        working-directory: projet-final
        run: |
          docker compose exec ansible-controller \
            ansible-galaxy collection install community.general

      - name: "STEP 1 — Gather facts controller"
        working-directory: projet-final
        run: |
          docker compose exec ansible-controller \
            ansible localhost -m gather_facts \
            --inventory /inventory/hosts.ini \
            -e "ansible_connection=local"

      - name: "STEP 2 — Ping noeuds Linux"
        working-directory: projet-final
        run: |
          docker compose exec ansible-controller \
            ansible linux_nodes -m ping \
            --inventory /inventory/hosts.ini

      - name: "STEP 3 — Playbook timezone (Paris puis Abidjan)"
        working-directory: projet-final
        run: |
          docker compose exec ansible-controller \
            ansible-playbook /ansible/playbook.yaml \
            --inventory /inventory/hosts.ini \
            -v

      - name: "STEP 4 — Verification finale timezones"
        working-directory: projet-final
        run: |
          echo "=== Verification finale ==="
          for c in ubuntu-node fedora-node redhat-node; do
            printf "[%s] timezone: " "$c"
            docker compose exec $c \
              sh -c "cat /etc/timezone 2>/dev/null || timedatectl show --property=Timezone --value"
          done

      - name: Afficher facts controller
        working-directory: projet-final
        run: docker compose exec ansible-controller cat /tmp/controller_facts.txt || true

      - name: Nettoyage
        if: always()
        working-directory: projet-final
        run: docker compose down -v
